# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: transcrib-s2t
metadata:
  template: transcrib-s2t@0.0.1

infra:
  provider: bicep
  path: infra
  module: main

services:
  api:
    project: ./src/api
    language: dotnet
    host: containerapp
    docker:
      path: ../Dockerfile
      context: ..
      remoteBuild: true

  functions:
    project: ./src/functions
    language: dotnet
    host: function

  # Note: the low-code transcription + purge workflows are now Consumption Logic
  # Apps (Microsoft.Logic/workflows). Their definitions are deployed inline via
  # Bicep (infra/modules/logicapps.bicep), so there is no azd service to package.

  frontend:
    project: ./src/frontend
    language: ts
    host: containerapp
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
      buildArgs:
        - NEXT_PUBLIC_API_BASE_URL=${SERVICE_API_ENDPOINT_URL}
